<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vestikita • Cartão Digital</title>

<style>

:root{
--bg:#128C8F;
--card:rgba(255,255,255,0.95);
--text:#1f2937;
--muted:#5b6472;
--brand:#128C8F;
--shadow:0 18px 40px rgba(0,0,0,.15);
}

body{
margin:0;
font-family:system-ui,Arial,sans-serif;
background:var(--bg);
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.card{
width:100%;
max-width:500px;
background:var(--card);
border-radius:20px;
box-shadow:var(--shadow);
padding:30px;
text-align:center;
}

.logo img{
width:160px;
margin-bottom:10px;
}

.subtitle{
color:var(--muted);
margin-bottom:20px;
font-size:18px;
}

.buttons{
display:flex;
flex-direction:column;
gap:14px;
margin-top:10px;
}

.btn{
display:flex;
align-items:center;
justify-content:space-between;
padding:15px;
border-radius:14px;
background:white;
border:1px solid #eee;
text-decoration:none;
color:var(--text);
font-weight:600;
font-size:16px;
transition:all .15s ease;
}

.btn:hover{
background:#f3f3f3;
transform:translateY(-2px);
}

.info{
font-size:14px;
margin-top:22px;
color:var(--muted);
line-height:1.5;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">
<img src="./logo.png" alt="Vestikita Logo">
</div>

<div class="subtitle">
Moda Infantil
</div>

<div class="buttons">

<a class="btn" href="https://wa.me/5581999550846" target="_blank">
<span>WhatsApp</span>
<span>💬</span>
</a>

<a class="btn" href="https://instagram.com/vestikita" target="_blank">
<span>Instagram</span>
<span>📷</span>
</a>

<a class="btn" href="mailto:vestikita.oficial@gmail.com">
<span>Email</span>
<span>✉️</span>
</a>

<a class="btn" href="https://www.google.com/maps/search/?api=1&query=Feira+do+Jeans+Toritama+PE" target="_blank">
<span>Localização</span>
<span>📍</span>
</a>

</div>

<div class="info">
Feira do Jeans – Toritama-PE<br>
Setor 2 • Fila C • Box 86 e 87
</div>

</div>

</body>
</html>
