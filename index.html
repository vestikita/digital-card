<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vestikita • Cartão Digital</title>

<style>

:root{
--bg:#128C8F;
--card:rgba(255,255,255,0.95);
--text:#1f2937;
--muted:#5b6472;
--shadow:0 18px 40px rgba(0,0,0,.15);
}

body{
margin:0;
font-family:system-ui,Arial,sans-serif;
background:var(--bg);
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
min-height:100vh;
padding:0 18px;
}

/* LOGO */
.logo-top{
display:flex;
justify-content:center;
margin-top:18px;   /* espaço acima da logo */
margin-bottom:12px;
}

.logo-top img{
width:180px;
}

/* CARTÃO */
.card{
width:100%;
max-width:300px;   /* cartão mais estreito */
margin-top:25px;
background:var(--card);
border-radius:30px;
box-shadow:var(--shadow);
padding:30px 24px;
text-align:center;
}

/* TITULO */
.subtitle{
color:var(--muted);
margin-bottom:22px;
font-size:20px;
font-weight:600;
}

/* BOTÕES */
.buttons{
display:flex;
flex-direction:column;
gap:14px;
}

.btn{
display:flex;
align-items:center;
justify-content:space-between;
padding:16px;
border-radius:16px;
background:white;
border:1px solid #eee;
text-decoration:none;
color:var(--text);
font-weight:600;
font-size:16px;
transition:all .15s ease;
}

.btn:hover{
background:#f3f3f3;
transform:translateY(-2px);
}

/* ENDEREÇO */
.info{
font-size:14px;
margin-top:24px;
color:var(--muted);
line-height:1.6;
}

</style>
</head>

<body>

<div class="logo-top">
<img src="./logo.png?v=7" alt="Vestikita Logo">
</div>

<div class="card">

<div class="subtitle">
Informações e Contatos
</div>

<div class="buttons">

<a class="btn" href="https://wa.me/5581999550846?text=Olá!%20Encontrei%20o%20contato%20da%20Vestikita%20e%20gostaria%20de%20receber%20mais%20informações%20sobre%20os%20produtos%20disponíveis.%20Poderia%20me%20ajudar?" target="_blank">
<span>WhatsApp</span>
<span>💬</span>
</a>

<a class="btn" href="https://instagram.com/vestikita" target="_blank">
<span>Instagram</span>
<span>📷</span>
</a>

<a class="btn" href="mailto:vestikita.oficial@gmail.com">
<span>Email</span>
<span>✉️</span>
</a>

<a class="btn" href="https://www.google.com/maps/search/?api=1&query=Feira+do+Jeans+Toritama+PE" target="_blank">
<span>Localização</span>
<span>📍</span>
</a>

</div>

<div class="info">
Feira do Jeans – Toritama-PE<br>
Setor 2 • Fila C • Box 86 e 87
</div>

</div>

</body>
</html>
